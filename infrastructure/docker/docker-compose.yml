version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stellarscope-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-stellarscope}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-stellarscope}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stellarscope}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: stellarscope-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-stellarscope}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-stellarscope}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # TODO: Add restart policy
    # TODO: Add resource limits

  indexer:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.indexer
    container_name: stellarscope-indexer
    environment:
      DATABASE_URL: postgresql://${DB_USER:-stellarscope}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-stellarscope}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    # TODO: Add restart policy
    # TODO: Add resource limits

volumes:
  postgres_data:
